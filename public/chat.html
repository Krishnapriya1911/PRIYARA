<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Messages — Priyaraa</title>
<link rel="stylesheet" href="style.css"/>
<style>
body{height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.nav{flex-shrink:0;}
.chat-wrap{flex:1;display:grid;grid-template-columns:300px 1fr;overflow:hidden;border-top:1px solid var(--sand);}
/* sidebar */
.conv-panel{border-right:1px solid var(--sand);background:white;display:flex;flex-direction:column;overflow:hidden;}
.cp-head{padding:1.2rem 1.5rem;border-bottom:1px solid var(--sand);}
.cp-title{font-family:'Instrument Serif',serif;font-size:20px;color:var(--ink);}
.cp-sub{font-family:'Caveat',cursive;font-size:13px;color:var(--muted);}
.conv-list{flex:1;overflow-y:auto;}
.conv{display:flex;gap:12px;padding:.9rem 1.2rem;border-bottom:1px solid var(--sand);cursor:pointer;transition:background .15s;}
.conv:hover,.conv.active{background:var(--rosebg);}
.cv-av{width:42px;height:42px;border-radius:50%;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.cv-info{flex:1;min-width:0;}
.cv-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.cv-name{font-weight:500;font-size:13px;color:var(--ink);}
.cv-time{font-family:'Caveat',cursive;font-size:12px;color:var(--muted);}
.cv-prev{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.unread{background:var(--rose);color:white;font-size:10px;font-weight:600;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* main chat */
.chat-main{display:flex;flex-direction:column;overflow:hidden;}
.chat-head{padding:1rem 1.5rem;border-bottom:1px solid var(--sand);display:flex;align-items:center;gap:12px;background:white;}
.ch-av{width:40px;height:40px;border-radius:50%;background:var(--rosebg);display:flex;align-items:center;justify-content:center;font-size:20px;}
.ch-name{font-family:'Instrument Serif',serif;font-size:18px;color:var(--ink);}
.ch-status{font-family:'Caveat',cursive;font-size:13px;color:var(--muted);}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;color:var(--muted);}
.chat-empty-icon{font-size:48px;opacity:.4;}
.chat-empty-t{font-family:'Instrument Serif',serif;font-size:1.2rem;color:var(--muted);}
.chat-empty-s{font-family:'Caveat',cursive;font-size:14px;}
.msg-area{flex:1;overflow-y:auto;padding:1.2rem 1.5rem;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:10px;align-items:flex-end;}
.msg.sent{flex-direction:row-reverse;}
.msg-av2{width:30px;height:30px;border-radius:50%;background:var(--rosebg);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.bubble{max-width:70%;padding:10px 14px;border-radius:18px;font-size:13.5px;line-height:1.6;}
.bubble.recv{background:white;border:1px solid var(--sand);border-bottom-left-radius:4px;color:var(--ink);}
.bubble.sent{background:var(--ink);color:var(--cream);border-bottom-right-radius:4px;}
.msg-t{font-size:10px;color:var(--muted);margin-top:3px;}
.msg-t.sent{text-align:right;}
/* input */
.chat-foot{flex-shrink:0;border-top:1px solid var(--sand);padding:1rem 1.5rem;display:flex;gap:10px;align-items:center;background:white;}
.msg-inp{flex:1;font-family:'DM Sans',sans-serif;font-size:13px;padding:11px 18px;border:1.5px solid var(--sand);border-radius:100px;background:var(--cream);outline:none;color:var(--ink);}
.msg-inp:focus{border-color:var(--rose);background:white;}
.msg-inp::placeholder{color:#c0b0a0;}
.send-btn2{width:40px;height:40px;border-radius:50%;background:var(--ink);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;}
.send-btn2:hover{background:var(--rose);}
@media(max-width:700px){.chat-wrap{grid-template-columns:1fr;}.conv-panel{display:none;}}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo">Priy<em>araa</em></a>
  <ul class="nav-links">
    <li><a href="index.html">Discover</a></li>
    <li><a href="reels.html">Reels</a></li>
    <li><a href="giftbot.html">🎁 Sona</a></li>
    <li><a href="chat.html" style="color:var(--rose);">Messages</a></li>
  </ul>
  <div class="nav-btns" id="nav-btns"><a href="login.html" class="btn btn-outline btn-sm">Login</a><a href="login.html" class="btn btn-dark btn-sm">Join free</a></div>
</nav>

<div class="chat-wrap">
  <div class="conv-panel">
    <div class="cp-head">
      <div class="cp-title">Messages</div>
      <div class="cp-sub">~ your artisan conversations</div>
    </div>
    <div class="conv-list" id="conv-list">
      <div style="padding:2rem;text-align:center;font-family:'Caveat',cursive;font-size:15px;color:var(--muted);">Loading conversations...</div>
    </div>
  </div>
  <div class="chat-main">
    <div class="chat-empty" id="chat-empty">
      <div class="chat-empty-icon">💬</div>
      <div class="chat-empty-t">Start a conversation</div>
      <div class="chat-empty-s">~ select a conversation or message an artisan</div>
    </div>
    <div class="chat-head" id="chat-head" style="display:none;">
      <div class="ch-av" id="ch-av">🌸</div>
      <div><div class="ch-name" id="ch-name">Artisan</div><div class="ch-status">● Active now</div></div>
      <div style="margin-left:auto;"><a id="ch-profile" href="#" class="btn btn-ghost btn-sm">View profile</a></div>
    </div>
    <div class="msg-area" id="msg-area" style="display:none;"></div>
    <div class="chat-foot" id="chat-foot" style="display:none;">
      <input class="msg-inp" id="msg-inp" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send-btn2" onclick="sendMsg()"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7L13 1L7 13L6.5 7.5L1 7Z" fill="white"/></svg></button>
    </div>
  </div>
</div>


<script>
let curUID=null,pollInt=null;

async function loadConvs(){
  if(!Auth.isLoggedIn()){document.getElementById('conv-list').innerHTML='<div style="padding:2rem;text-align:center;font-family:\'Caveat\',cursive;font-size:15px;color:var(--muted);"><a href="login.html" class="btn btn-dark btn-sm">Login to chat</a></div>';return;}
  const res=await PriyaraaAPI.messages.conversations();
  const list=document.getElementById('conv-list');
  if(!res.success||!res.conversations.length){list.innerHTML='<div style="padding:2rem;text-align:center;font-family:\'Caveat\',cursive;font-size:15px;color:var(--muted);">~ no conversations yet<br><a href="index.html" class="btn btn-dark btn-sm" style="margin-top:.8rem;">Explore artisans</a></div>';return;}
  list.innerHTML=res.conversations.map(c=>`
    <div class="conv" onclick="openChat(${c.other_id},'${c.other_name}','${c.other_avatar||'🌸'}')">
      <div class="cv-av">${c.other_avatar||'🌸'}</div>
      <div class="cv-info">
        <div class="cv-top"><span class="cv-name">${c.other_name}</span><span class="cv-time">${tAgo(c.last_time)}</span></div>
        <div class="cv-prev">${c.last_message||'Say hi!'}</div>
      </div>
    </div>`).join('');
}

async function openChat(uid,name,av){
  curUID=uid;
  document.querySelectorAll('.conv').forEach(c=>c.classList.remove('active'));
  document.getElementById('chat-empty').style.display='none';
  document.getElementById('chat-head').style.display='flex';
  document.getElementById('msg-area').style.display='flex';
  document.getElementById('chat-foot').style.display='flex';
  document.getElementById('ch-av').textContent=av||'🌸';
  document.getElementById('ch-name').textContent=name;
  document.getElementById('ch-profile').href='seller.html?id='+uid;

  const res=await PriyaraaAPI.messages.get(uid);
  if(!res.success)return;
  const me=Auth.user();
  const area=document.getElementById('msg-area');
  area.innerHTML=res.messages.map(m=>{
    const mine=m.sender_id===me.id;
    return`<div class="msg ${mine?'sent':''}">
      <div class="msg-av2" style="background:${mine?'var(--ink)':'var(--rosebg)'};">${mine?(me.avatar||'Y'):(m.sender_avatar||'🌸')}</div>
      <div><div class="bubble ${mine?'sent':'recv'}">${m.text||''}</div><div class="msg-t ${mine?'sent':''}">${new Date(m.created_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div></div>
    </div>`;
  }).join('');
  area.scrollTop=area.scrollHeight;
  if(pollInt)clearInterval(pollInt);
  pollInt=setInterval(()=>openChat(curUID,name,av),5000);
}

async function sendMsg(){
  if(!curUID)return;
  const inp=document.getElementById('msg-inp');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';
  const res=await PriyaraaAPI.messages.send(curUID,txt);
  if(res.success){
    const me=Auth.user();
    const area=document.getElementById('msg-area');
    const d=document.createElement('div');
    d.className='msg sent';
    d.innerHTML=`<div class="msg-av2" style="background:var(--ink);">${me?.avatar||'Y'}</div><div><div class="bubble sent">${txt}</div><div class="msg-t sent">Just now</div></div>`;
    area.appendChild(d);area.scrollTop=area.scrollHeight;
  }
}

function tAgo(d){if(!d)return'';const m=Math.floor((Date.now()-new Date(d))/60000);if(m<1)return'now';if(m<60)return m+'m';return Math.floor(m/60)+'h';}

// auto-open if userId in URL
const uid=new URLSearchParams(window.location.search).get('userId');
if(uid)openChat(uid,'Artisan','🌸');

loadConvs();updateNav();
</script>

<!-- THEME SWITCHER -->
<div class="theme-switcher">
  <div class="theme-palette" id="palette">
    <div class="palette-opt active" data-theme="light" onclick="setTheme('light')">
      <div class="palette-dot" style="background:#C2607E;border:2px solid #FBF7F0;box-shadow:0 0 0 1px #C2607E;"></div>Rose Light
    </div>
    <div class="palette-opt" data-theme="dark" onclick="setTheme('dark')">
      <div class="palette-dot" style="background:#e8849e;border:2px solid #0f0d0b;"></div>Rose Dark
    </div>
    <div class="palette-opt" data-theme="green" onclick="setTheme('green')">
      <div class="palette-dot" style="background:#4a8c5c;border:2px solid #f4faf6;"></div>Sage Light
    </div>
    <div class="palette-opt" data-theme="dark-green" onclick="setTheme('dark-green')">
      <div class="palette-dot" style="background:#6abf80;border:2px solid #080f0a;"></div>Forest Dark
    </div>
  </div>
  <div class="theme-toggle-btn" id="theme-toggle" onclick="togglePalette()">🎨</div>
</div>
<script src="/api.js"></script>
<script>

// ── THEME SWITCHER ──
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('priyaraa_theme',t);
  document.querySelectorAll('.palette-opt').forEach(o=>o.classList.toggle('active',o.getAttribute('data-theme')===t));
}
function togglePalette(){document.getElementById('palette').classList.toggle('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.theme-switcher'))document.getElementById('palette')?.classList.remove('open');});
(function(){const t=localStorage.getItem('priyaraa_theme');if(t)setTheme(t);})();

// ── NAV: show logged-in user ──
(function(){
  const user=Auth.user();
  const btns=document.querySelector('.nav-btns');
  if(btns&&user){
    btns.innerHTML=`<span style="font-family:'Caveat',cursive;font-size:15px;color:var(--muted);">~ ${user.name.split(' ')[0]}</span>
      <div style="width:32px;height:32px;border-radius:50%;background:var(--rosebg);border:1.5px solid var(--rose2);display:flex;align-items:center;justify-content:center;font-size:15px;">${user.avatar||'🌸'}</div>
      <button onclick="Auth.logout()" class="btn btn-ghost btn-sm">logout</button>`;
  }
})();

</script>
</body>
</html>
